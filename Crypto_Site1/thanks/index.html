    <style>
        :root {
            --brand-main: #8B5CF6; 
            --gradient-accent: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            --brand-glow: rgba(139, 92, 246, 0.5);
        }

        body {
            margin: 0; padding: 0;
            background: linear-gradient(145deg, #0f0c1b 0%, #261142 50%, #0d081a 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center; text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Фоновая сетка как на главной странице */
        body::before {
            content: ''; position: absolute; inset: 0;
            background-image: 
                linear-gradient(rgba(139, 92, 246, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.05) 1px, transparent 1px);
            background-size: 35px 35px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
            z-index: 0; pointer-events: none;
        }

        .container { padding: 30px; max-width: 600px; position: relative; z-index: 2; }
        h1 { font-family: 'Manrope', sans-serif; font-size: clamp(36px, 6vw, 54px); margin: 0 0 25px 0; font-weight: 800; }
        p { font-size: 18px; color: rgba(255,255,255,0.8); margin: 0 0 40px; line-height: 1.6; }
        
        /* Стили для блока со статистикой под новый дизайн */
        .stats-list {
            list-style: none;
            padding: 0;
            margin: 0 auto 25px auto;
            text-align: left;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(139, 92, 246, 0.15);
            border-radius: 16px;
            padding: 20px 25px;
            max-width: 480px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .stats-list li {
            margin-bottom: 15px;
            font-size: 15px;
            color: rgba(255,255,255,0.9);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            line-height: 1.5;
        }
        .stats-list li:last-child {
            margin-bottom: 0;
        }
        .stats-list li::before {
            content: '✓';
            color: #ec4899;
            font-weight: bold;
            font-size: 14px;
            background: rgba(236, 72, 153, 0.15);
            width: 22px; height: 22px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .btn-neon {
            display: inline-block;
            background: var(--gradient-accent); 
            color: #fff; padding: 18px 45px;
            border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 17px;
            box-shadow: 0 10px 25px var(--brand-glow); 
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-neon:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 35px rgba(236, 72, 153, 0.5); 
        }
        
        .icon { font-size: 80px; margin-bottom: 20px; display: block; animation: pop 0.5s ease-out; }
        @keyframes pop { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>

   <div class="container">

    <a href="/" class="btn-neon">Вернуться на сайт</a>
</div>
